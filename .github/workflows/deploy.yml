name: Build & Deploy

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  OWNER: paulluxw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ha-dashboard-server:latest
            ghcr.io/${{ env.OWNER }}/ha-dashboard-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ha-dashboard-client:latest
            ghcr.io/${{ env.OWNER }}/ha-dashboard-client:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
