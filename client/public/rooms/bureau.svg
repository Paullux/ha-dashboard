<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="paper" x="-2%" y="-2%" width="104%" height="104%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="6" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
  </filter>
  <filter id="wc" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.025 0.03" numOctaves="2" seed="15" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="wc2" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.04 0.05" numOctaves="2" seed="9" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="G" yChannelSelector="R"/>
  </filter>
</defs>
<g filter="url(#paper)">
  <!-- Wall -->
  <rect x="0" y="0" width="360" height="168" fill="#EDE5D0"/>
  <!-- Baseboard -->
  <path d="M0,161 Q180,158 360,161 L360,169 L0,169 Z" fill="#D8CEBC" stroke="#C8BCA8" stroke-width="0.5"/>
  <!-- Floor -->
  <path d="M0,161 Q180,157 360,161 L360,240 L0,240 Z" fill="#C8906A"/>
  <line x1="0" y1="182" x2="360" y2="180" stroke="#B8804A" stroke-width="0.6" opacity="0.45"/>
  <line x1="0" y1="202" x2="360" y2="200" stroke="#B8804A" stroke-width="0.6" opacity="0.4"/>
  <line x1="0" y1="222" x2="360" y2="220" stroke="#B8804A" stroke-width="0.5" opacity="0.35"/>
  <line x1="55"  y1="161" x2="38"  y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="120" y1="161" x2="110" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="180" y1="161" x2="178" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="240" y1="161" x2="250" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="305" y1="161" x2="322" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>

  <!-- Bookshelf (left wall) -->
  <g filter="url(#wc)">
    <rect x="0" y="8" width="78" height="155" fill="#9A7A50" stroke="#7A5A30" stroke-width="1.5"/>
    <!-- shelves -->
    <rect x="2" y="8"   width="74" height="6"  fill="#B89060"/>
    <rect x="2" y="52"  width="74" height="5"  fill="#B89060"/>
    <rect x="2" y="96"  width="74" height="5"  fill="#B89060"/>
    <rect x="2" y="140" width="74" height="5"  fill="#B89060"/>
    <!-- books row 1 -->
    <rect x="4"  y="15" width="9"  height="36" rx="1" fill="#C84848"/>
    <rect x="15" y="18" width="8"  height="33" rx="1" fill="#4878C8"/>
    <rect x="25" y="14" width="10" height="37" rx="1" fill="#48A858"/>
    <rect x="37" y="17" width="7"  height="34" rx="1" fill="#C8A028"/>
    <rect x="46" y="15" width="9"  height="36" rx="1" fill="#8848C8"/>
    <rect x="57" y="18" width="8"  height="33" rx="1" fill="#C86828"/>
    <rect x="67" y="16" width="9"  height="35" rx="1" fill="#2888A8"/>
    <!-- books row 2 -->
    <rect x="4"  y="59" width="8"  height="32" rx="1" fill="#A85858"/>
    <rect x="14" y="57" width="10" height="34" rx="1" fill="#58A868"/>
    <rect x="26" y="60" width="7"  height="31" rx="1" fill="#C8C028"/>
    <rect x="35" y="58" width="9"  height="33" rx="1" fill="#5858C8"/>
    <rect x="46" y="59" width="8"  height="32" rx="1" fill="#C85888"/>
    <rect x="56" y="57" width="11" height="34" rx="1" fill="#28A8A8"/>
    <rect x="69" y="60" width="7"  height="31" rx="1" fill="#A88828"/>
    <!-- books row 3 (some leaning) -->
    <rect x="4"  y="103" width="9"  height="32" rx="1" fill="#88C848"/>
    <rect x="15" y="101" width="8"  height="34" rx="1" fill="#C84888"/>
    <rect x="25" y="104" width="10" height="31" rx="1" fill="#4848C8"/>
    <rect x="37" y="102" width="7"  height="33" rx="1" fill="#C88848"/>
    <!-- small objects row 4 -->
    <rect x="6"  y="145" width="14" height="12" rx="2" fill="#C8B888"/>
    <rect x="24" y="143" width="10" height="14" rx="1" fill="#8898C8"/>
    <ellipse cx="46" cy="148" rx="8" ry="5" fill="#5A8A42"/>
    <rect x="56" y="144" width="16" height="13" rx="2" fill="#C87858"/>
  </g>

  <!-- Window top right -->
  <g filter="url(#wc2)">
    <rect x="258" y="8" width="100" height="68" rx="2" fill="#C2D8E5" stroke="#B0A888" stroke-width="2.5"/>
    <rect x="260" y="10" width="46" height="64" fill="#D0E8F4" opacity="0.75"/>
    <rect x="308" y="10" width="50" height="64" fill="#C8E2EE" opacity="0.75"/>
    <line x1="308" y1="10" x2="308" y2="74" stroke="#B0A888" stroke-width="2"/>
    <line x1="260" y1="38" x2="358" y2="38" stroke="#B0A888" stroke-width="1.5"/>
  </g>

  <!-- Desk shadow -->
  <ellipse cx="210" cy="200" rx="128" ry="8" fill="#8B6840" opacity="0.2"/>

  <!-- Desk -->
  <g filter="url(#wc)">
    <!-- desk top -->
    <path d="M82,130 Q82,124 90,122 L338,122 Q346,124 346,130 L344,142 Q344,146 336,146 L90,146 Q82,146 82,142 Z" fill="#A07850" stroke="#806030" stroke-width="1.5"/>
    <!-- desk surface shine -->
    <path d="M94,126 Q210,123 334,126" stroke="#C09060" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- legs -->
    <rect x="92"  y="142" width="12" height="28" rx="2" fill="#906840" stroke="#706030" stroke-width="1"/>
    <rect x="326" y="142" width="12" height="28" rx="2" fill="#906840" stroke="#706030" stroke-width="1"/>

    <!-- Monitor -->
    <rect x="162" y="68" width="108" height="72" rx="4" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="166" y="72" width="100" height="62" rx="2" fill="#1A2840"/>
    <!-- screen content (code-ish) -->
    <rect x="170" y="78" width="55" height="3" rx="1" fill="#4A8AC8" opacity="0.8"/>
    <rect x="170" y="84" width="35" height="3" rx="1" fill="#C88A4A" opacity="0.7"/>
    <rect x="178" y="90" width="48" height="3" rx="1" fill="#4AC878" opacity="0.7"/>
    <rect x="178" y="96" width="42" height="3" rx="1" fill="#C84A4A" opacity="0.7"/>
    <rect x="170" y="102" width="60" height="3" rx="1" fill="#4A8AC8" opacity="0.6"/>
    <rect x="170" y="108" width="28" height="3" rx="1" fill="#A8A8A8" opacity="0.5"/>
    <rect x="170" y="114" width="50" height="3" rx="1" fill="#4AC878" opacity="0.6"/>
    <rect x="170" y="120" width="38" height="3" rx="1" fill="#C88A4A" opacity="0.6"/>
    <!-- screen reflection -->
    <path d="M228,74 L252,98" stroke="#FFFFFF" stroke-width="1.5" opacity="0.08"/>
    <!-- monitor stand -->
    <rect x="208" y="138" width="16" height="8" rx="1" fill="#3A3A3A"/>
    <rect x="198" y="144" width="36" height="4" rx="1" fill="#2A2A2A"/>

    <!-- Keyboard -->
    <rect x="154" y="136" width="80" height="10" rx="2" fill="#3A3A3A" stroke="#252525" stroke-width="0.8"/>
    <!-- key lines -->
    <rect x="158" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="166" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="174" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="182" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="190" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="198" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="206" y="138" width="6" height="3" rx="0.5" fill="#4A4A4A"/>
    <rect x="162" y="143" width="50" height="2" rx="0.5" fill="#4A4A4A"/>

    <!-- Mouse -->
    <path d="M248,136 Q248,132 254,132 Q260,132 260,136 L260,146 Q260,150 254,150 Q248,150 248,146 Z" fill="#3A3A3A" stroke="#252525" stroke-width="0.8"/>
    <line x1="254" y1="132" x2="254" y2="142" stroke="#252525" stroke-width="0.6"/>
  </g>

  <!-- Desk lamp -->
  <g filter="url(#wc2)">
    <rect x="290" y="116" width="6" height="14" rx="1" fill="#8B7055"/>
    <path d="M293,116 Q300,108 310,110 Q318,112 316,122 Q314,128 308,128 L296,124 Z" fill="#F0CC58" stroke="#D8AA40" stroke-width="1.2"/>
    <!-- lamp halo -->
    <ellipse cx="305" cy="135" rx="28" ry="10" fill="#FFF3B0" opacity="0.3"/>
  </g>

  <!-- Coffee mug on desk -->
  <g filter="url(#wc2)">
    <rect x="108" y="128" width="18" height="16" rx="2" fill="#F0F0E8" stroke="#D0C8B8" stroke-width="1"/>
    <path d="M126,133 Q132,133 132,138 Q132,143 126,143" stroke="#D0C8B8" stroke-width="1.5" fill="none"/>
    <!-- steam -->
    <path d="M113,128 Q112,122 114,118" stroke="#C8C8C8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M117,128 Q116,121 118,117" stroke="#C8C8C8" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- coffee inside -->
    <ellipse cx="117" cy="130" rx="7" ry="2" fill="#8B5A28" opacity="0.5"/>
  </g>

  <!-- Chair -->
  <g filter="url(#wc)">
    <!-- back -->
    <path d="M168,152 Q166,148 168,144 L206,144 Q208,148 206,152 L206,168 Q180,170 168,168 Z" fill="#3A4870" stroke="#2A3860" stroke-width="1.2"/>
    <!-- seat -->
    <path d="M154,168 Q154,164 160,162 L214,162 Q220,164 220,168 L218,178 Q215,182 187,182 Q158,182 156,178 Z" fill="#4A5880" stroke="#3A4870" stroke-width="1.2"/>
    <!-- wheels -->
    <circle cx="164" cy="185" r="5" fill="#3A3A3A"/>
    <circle cx="210" cy="185" r="5" fill="#3A3A3A"/>
    <circle cx="187" cy="188" r="5" fill="#3A3A3A"/>
    <!-- stem -->
    <rect x="184" y="178" width="6" height="12" rx="2" fill="#606060"/>
    <!-- base -->
    <path d="M164,185 L187,188 L210,185" stroke="#505050" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- armrests -->
    <rect x="154" y="158" width="8" height="20" rx="2" fill="#3A4870"/>
    <rect x="222" y="158" width="8" height="20" rx="2" fill="#3A4870"/>
  </g>

  <!-- Small plant on desk right -->
  <g filter="url(#wc2)">
    <rect x="316" y="118" width="20" height="12" rx="2" fill="#C46A42" stroke="#A05030" stroke-width="1"/>
    <ellipse cx="326" cy="117" rx="12" ry="4" fill="#7A4228"/>
    <path d="M320,116 Q316,106 310,100" stroke="#3A7A2A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M326,116 Q326,104 326,98" stroke="#3A7A2A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M332,116 Q336,106 342,100" stroke="#3A7A2A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="310" cy="99" rx="9" ry="6" fill="#4A8A42"/>
    <ellipse cx="326" cy="97" rx="8" ry="5" fill="#5A9A42"/>
    <ellipse cx="342" cy="99" rx="9" ry="6" fill="#4A8A42"/>
  </g>
</g>
</svg>
