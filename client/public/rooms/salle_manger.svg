<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="paper" x="-2%" y="-2%" width="104%" height="104%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="17" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
  </filter>
  <filter id="wc" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.025 0.03" numOctaves="2" seed="22" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="wc2" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.04 0.05" numOctaves="2" seed="11" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="G" yChannelSelector="R"/>
  </filter>
  <radialGradient id="lampglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFF3A0" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#FFF3A0" stop-opacity="0"/>
  </radialGradient>
</defs>
<g filter="url(#paper)">
  <!-- Wall -->
  <rect x="0" y="0" width="360" height="168" fill="#EDE5D0"/>
  <!-- Baseboard -->
  <path d="M0,161 Q180,158 360,161 L360,169 L0,169 Z" fill="#D8CEBC" stroke="#C8BCA8" stroke-width="0.5"/>
  <!-- Floor -->
  <path d="M0,161 Q180,157 360,161 L360,240 L0,240 Z" fill="#C8906A"/>
  <line x1="0" y1="182" x2="360" y2="180" stroke="#B8804A" stroke-width="0.6" opacity="0.45"/>
  <line x1="0" y1="202" x2="360" y2="200" stroke="#B8804A" stroke-width="0.6" opacity="0.4"/>
  <line x1="0" y1="222" x2="360" y2="220" stroke="#B8804A" stroke-width="0.5" opacity="0.3"/>
  <line x1="55"  y1="161" x2="38"  y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="120" y1="161" x2="110" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="180" y1="161" x2="178" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="240" y1="161" x2="250" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="305" y1="161" x2="322" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>

  <!-- Sideboard / buffet (back left) -->
  <g filter="url(#wc2)">
    <rect x="4" y="98" width="110" height="64" rx="3" fill="#8B6A40" stroke="#6A4A20" stroke-width="1.5"/>
    <line x1="4" y1="130" x2="114" y2="130" stroke="#6A4A20" stroke-width="1"/>
    <line x1="58" y1="130" x2="58" y2="162" stroke="#6A4A20" stroke-width="1"/>
    <rect x="10" y="105" width="42" height="22" rx="2" fill="#9A7A50" stroke="#7A5A30" stroke-width="0.8"/>
    <rect x="62" y="105" width="44" height="22" rx="2" fill="#9A7A50" stroke="#7A5A30" stroke-width="0.8"/>
    <rect x="10" y="135" width="20" height="22" rx="2" fill="#9A7A50" stroke="#7A5A30" stroke-width="0.8"/>
    <rect x="34" y="135" width="20" height="22" rx="2" fill="#9A7A50" stroke="#7A5A30" stroke-width="0.8"/>
    <rect x="62" y="135" width="20" height="22" rx="2" fill="#9A7A50" stroke="#7A5A30" stroke-width="0.8"/>
    <rect x="86" y="135" width="22" height="22" rx="2" fill="#9A7A50" stroke="#7A5A30" stroke-width="0.8"/>
    <circle cx="31" cy="116" r="2" fill="#C8A040"/>
    <circle cx="84" cy="116" r="2" fill="#C8A040"/>
    <circle cx="20" cy="146" r="1.5" fill="#C8A040"/>
    <circle cx="44" cy="146" r="1.5" fill="#C8A040"/>
    <circle cx="72" cy="146" r="1.5" fill="#C8A040"/>
    <circle cx="97" cy="146" r="1.5" fill="#C8A040"/>
    <!-- items on top of sideboard -->
    <path d="M12,90 Q12,86 16,86 L34,86 Q38,86 38,90 L38,100 L12,100 Z" fill="#C46A42" stroke="#A05030" stroke-width="1"/>
    <ellipse cx="25" cy="88" rx="13" ry="5" fill="#4A8A42"/>
    <path d="M18,87 Q25,79 32,87" stroke="#3A7032" stroke-width="1" fill="none"/>
    <!-- vase with flowers -->
    <path d="M52,91 Q50,88 50,96 L64,96 Q64,88 62,91 Z" fill="#A8C0D8" stroke="#88A0C0" stroke-width="1"/>
    <path d="M53,91 Q56,80 54,70" stroke="#4A7A3A" stroke-width="1.5" fill="none"/>
    <path d="M57,91 Q58,78 60,68" stroke="#4A7A3A" stroke-width="1.5" fill="none"/>
    <path d="M61,91 Q64,80 66,72" stroke="#4A7A3A" stroke-width="1.5" fill="none"/>
    <circle cx="53" cy="70" r="5" fill="#E85080"/>
    <circle cx="60" cy="67" r="5" fill="#F0A040"/>
    <circle cx="67" cy="71" r="5" fill="#E85080"/>
    <!-- picture frame -->
    <rect x="76" y="78" width="32" height="22" rx="1" fill="#8B7248" stroke="#7A6238" stroke-width="1.5"/>
    <rect x="79" y="81" width="26" height="16" fill="#C8D8A0"/>
    <ellipse cx="88" cy="92" rx="8" ry="6" fill="#5A8A42"/>
    <ellipse cx="98" cy="90" rx="6" ry="5" fill="#4A7A32"/>
    <circle cx="95" cy="84" rx="4" fill="#F0D040"/>
  </g>

  <!-- Window right wall -->
  <g filter="url(#wc2)">
    <rect x="262" y="12" width="90" height="68" rx="2" fill="#C2D8E5" stroke="#B0A888" stroke-width="2.5"/>
    <rect x="264" y="14" width="42" height="64" fill="#D0E8F4" opacity="0.75"/>
    <rect x="308" y="14" width="42" height="64" fill="#C8E2EE" opacity="0.75"/>
    <line x1="308" y1="14" x2="308" y2="78" stroke="#B0A888" stroke-width="2"/>
    <line x1="264" y1="45" x2="350" y2="45" stroke="#B0A888" stroke-width="1.5"/>
  </g>

  <!-- Pendant lamp above table -->
  <g filter="url(#wc2)">
    <line x1="180" y1="0" x2="180" y2="30" stroke="#8B7055" stroke-width="2"/>
    <!-- shade -->
    <path d="M156,26 Q180,16 204,26 L200,52 Q180,60 160,52 Z" fill="#C8A840" stroke="#A88020" stroke-width="1.5"/>
    <path d="M160,30 Q180,24 200,30" stroke="#E0C050" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- bulb glow -->
    <ellipse cx="180" cy="175" rx="70" ry="16" fill="url(#lampglow)"/>
    <circle cx="180" cy="48" r="6" fill="#FFF0A0" opacity="0.8"/>
  </g>

  <!-- Table shadow -->
  <ellipse cx="180" cy="200" rx="130" ry="9" fill="#8B6840" opacity="0.2"/>

  <!-- Dining table -->
  <g filter="url(#wc)">
    <!-- tabletop -->
    <path d="M50,128 Q50,122 58,120 L302,120 Q310,122 310,128 L308,144 Q308,150 300,150 L60,150 Q50,150 50,144 Z" fill="#8B6A40" stroke="#6A4A20" stroke-width="1.5"/>
    <!-- table edge highlight -->
    <path d="M60,124 Q180,121 300,124" stroke="#A07850" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- table legs -->
    <rect x="66"  y="146" width="14" height="26" rx="3" fill="#7A5A30" stroke="#5A3A10" stroke-width="1"/>
    <rect x="280" y="146" width="14" height="26" rx="3" fill="#7A5A30" stroke="#5A3A10" stroke-width="1"/>
    <!-- tablecloth / runner -->
    <rect x="120" y="120" width="120" height="30" fill="#F0E8D0" opacity="0.5"/>
    <!-- items on table: candle center -->
    <rect x="176" y="112" width="8" height="16" rx="1" fill="#F0F0E8" stroke="#D8D4CC" stroke-width="0.8"/>
    <path d="M179,112 Q180,107 181,112" stroke="#F0A040" stroke-width="1.5" fill="none"/>
    <ellipse cx="180" cy="112" rx="5" ry="2" fill="#F0C840" opacity="0.6"/>
    <!-- plate left -->
    <ellipse cx="110" cy="134" rx="22" ry="8" fill="#F0EDE6" stroke="#D8D4CC" stroke-width="1"/>
    <ellipse cx="110" cy="134" rx="15" ry="6" fill="#E8E4DC"/>
    <!-- plate right -->
    <ellipse cx="250" cy="134" rx="22" ry="8" fill="#F0EDE6" stroke="#D8D4CC" stroke-width="1"/>
    <ellipse cx="250" cy="134" rx="15" ry="6" fill="#E8E4DC"/>
    <!-- wine glasses -->
    <path d="M144,118 Q141,112 138,108 Q136,104 140,104 Q144,104 142,108 L139,118" stroke="#C8D8D8" stroke-width="1.5" fill="none"/>
    <path d="M220,118 Q217,112 214,108 Q212,104 216,104 Q220,104 218,108 L215,118" stroke="#C8D8D8" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Chairs -->
  <g filter="url(#wc)">
    <!-- Chair top (behind table) -->
    <path d="M92,104 Q90,100 92,96 L126,96 Q128,100 126,104 L124,118 Q124,122 109,122 Q94,122 94,118 Z" fill="#C8904A" stroke="#A87030" stroke-width="1.2"/>
    <path d="M96,100 Q109,98 122,100" stroke="#D8A060" stroke-width="0.8" fill="none" opacity="0.5"/>

    <path d="M160,98 Q158,94 160,90 L198,90 Q200,94 198,98 L196,118 Q196,122 179,122 Q162,122 162,118 Z" fill="#A87850" stroke="#886030" stroke-width="1.2"/>

    <path d="M234,98 Q232,94 234,90 L270,90 Q272,94 270,98 L268,118 Q268,122 252,122 Q236,122 236,118 Z" fill="#C8904A" stroke="#A87030" stroke-width="1.2"/>

    <!-- Chair bottom (in front of table) -->
    <path d="M88,148 Q86,148 85,152 L85,172 Q86,176 92,176 L118,176 L118,148 Z" fill="#C8904A" stroke="#A87030" stroke-width="1.2"/>
    <path d="M88,148 L118,148 Q120,152 118,156 L88,156 Q86,152 88,148 Z" fill="#D8A060"/>
    <path d="M86,176 L120,176 Q120,180 88,180 Z" fill="#B87840"/>

    <path d="M240,148 Q238,148 237,152 L237,172 Q238,176 244,176 L270,176 L270,148 Z" fill="#A87850" stroke="#886030" stroke-width="1.2"/>
    <path d="M240,148 L270,148 Q272,152 270,156 L240,156 Q238,152 240,148 Z" fill="#B88860"/>
    <path d="M238,176 L272,176 Q272,180 240,180 Z" fill="#906840"/>

    <!-- Chair right side (visible) -->
    <path d="M312,112 Q314,108 318,106 L338,106 Q342,108 340,112 L338,148 Q338,152 325,152 Q312,152 312,148 Z" fill="#C8904A" stroke="#A87030" stroke-width="1.2"/>
    <path d="M316,110 Q326,108 336,110" stroke="#D8A060" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>
</g>
</svg>
