<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="paper" x="-2%" y="-2%" width="104%" height="104%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="11" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
  </filter>
  <filter id="wc" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.025 0.03" numOctaves="2" seed="4" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="wc2" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.04 0.05" numOctaves="2" seed="14" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="G" yChannelSelector="R"/>
  </filter>
</defs>
<g filter="url(#paper)">
  <!-- Wall -->
  <rect x="0" y="0" width="360" height="170" fill="#EDE5D0"/>
  <!-- Baseboard -->
  <path d="M0,163 Q180,160 360,163 L360,171 L0,171 Z" fill="#D8CEBC" stroke="#C8BCA8" stroke-width="0.5"/>
  <!-- Floor -->
  <path d="M0,163 Q180,159 360,163 L360,240 L0,240 Z" fill="#C8906A"/>
  <line x1="0" y1="183" x2="360" y2="181" stroke="#B8804A" stroke-width="0.6" opacity="0.45"/>
  <line x1="0" y1="203" x2="360" y2="201" stroke="#B8804A" stroke-width="0.6" opacity="0.4"/>
  <line x1="0" y1="223" x2="360" y2="221" stroke="#B8804A" stroke-width="0.5" opacity="0.35"/>
  <line x1="55"  y1="163" x2="38"  y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="120" y1="163" x2="110" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="180" y1="163" x2="178" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="240" y1="163" x2="250" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>
  <line x1="305" y1="163" x2="322" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.3"/>

  <!-- Window center top -->
  <g filter="url(#wc2)">
    <rect x="130" y="8" width="100" height="72" rx="2" fill="#C2D8E5" stroke="#B0A888" stroke-width="2.5"/>
    <rect x="132" y="10" width="46" height="68" fill="#D0E8F4" opacity="0.75"/>
    <rect x="180" y="10" width="48" height="68" fill="#C8E2EE" opacity="0.75"/>
    <line x1="180" y1="10" x2="180" y2="78" stroke="#B0A888" stroke-width="2"/>
    <line x1="132" y1="42" x2="228" y2="42" stroke="#B0A888" stroke-width="1.5"/>
    <!-- curtains -->
    <path d="M130,8 Q115,15 112,40 Q115,65 130,80" fill="#E8D4C0" stroke="#D0B8A0" stroke-width="1.5"/>
    <path d="M230,8 Q245,15 248,40 Q245,65 230,80" fill="#E8D4C0" stroke="#D0B8A0" stroke-width="1.5"/>
  </g>

  <!-- Painting above bed -->
  <g filter="url(#wc2)">
    <rect x="152" y="10" width="56" height="40" rx="2" fill="#8B7248" stroke="#7A6238" stroke-width="1.5"/>
    <rect x="155" y="13" width="50" height="34" fill="#D4C8A8"/>
    <!-- abstract art: simple botanical -->
    <path d="M180,42 Q180,30 178,22" stroke="#4A7A3A" stroke-width="2" fill="none"/>
    <ellipse cx="174" cy="26" rx="7" ry="5" fill="#5A8A48" transform="rotate(-20,174,26)"/>
    <ellipse cx="186" cy="28" rx="6" ry="4" fill="#6A9A52" transform="rotate(15,186,28)"/>
    <ellipse cx="176" cy="34" rx="5" ry="4" fill="#4A7A38" transform="rotate(-10,176,34)"/>
  </g>

  <!-- Rug under bed -->
  <g filter="url(#wc)">
    <path d="M60,190 Q180,186 300,190 L296,225 Q180,229 64,225 Z" fill="#C8A878" stroke="#A88858" stroke-width="1.5"/>
    <!-- rug pattern -->
    <path d="M80,195 Q180,192 280,195 L278,220 Q180,223 82,220 Z" fill="none" stroke="#B89058" stroke-width="0.8"/>
    <path d="M100,200 Q180,198 260,200" stroke="#B89058" stroke-width="0.5" fill="none"/>
    <path d="M100,215 Q180,213 260,215" stroke="#B89058" stroke-width="0.5" fill="none"/>
    <line x1="150" y1="194" x2="148" y2="221" stroke="#B89058" stroke-width="0.5"/>
    <line x1="180" y1="193" x2="180" y2="222" stroke="#B89058" stroke-width="0.5"/>
    <line x1="210" y1="194" x2="212" y2="221" stroke="#B89058" stroke-width="0.5"/>
  </g>

  <!-- Bed shadow -->
  <ellipse cx="180" cy="192" rx="110" ry="7" fill="#8B6840" opacity="0.18"/>

  <!-- Bed frame + headboard -->
  <g filter="url(#wc)">
    <!-- headboard -->
    <path d="M60,82 Q58,78 62,72 Q66,66 80,65 L280,65 Q294,66 298,72 Q302,78 300,82 L300,125 L60,125 Z" fill="#A07850" stroke="#806030" stroke-width="1.5"/>
    <!-- headboard panels -->
    <rect x="70" y="72" width="55" height="44" rx="4" fill="#B88A60" stroke="#906840" stroke-width="1"/>
    <rect x="133" y="72" width="54" height="44" rx="4" fill="#B88A60" stroke="#906840" stroke-width="1"/>
    <rect x="195" y="72" width="55" height="44" rx="4" fill="#B88A60" stroke="#906840" stroke-width="1"/>
    <!-- headboard highlight -->
    <path d="M75,76 Q98,74 120,76" stroke="#C8A070" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M138,76 Q160,74 182,76" stroke="#C8A070" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M200,76 Q223,74 245,76" stroke="#C8A070" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- bed base -->
    <rect x="55" y="120" width="250" height="58" rx="3" fill="#906840" stroke="#706030" stroke-width="1.5"/>
    <!-- mattress -->
    <path d="M58,120 Q180,116 302,120 L302,168 Q180,172 58,168 Z" fill="#F0E8D4" stroke="#D8CEB8" stroke-width="1.2"/>

    <!-- Duvet / comforter -->
    <path d="M62,124 Q180,120 298,124 L296,165 Q180,169 64,165 Z" fill="#E8D4BC"/>
    <!-- duvet folds -->
    <path d="M80,128 Q180,124 280,128" stroke="#D8C0A0" stroke-width="1" fill="none"/>
    <path d="M75,138 Q180,134 285,138" stroke="#D8C0A0" stroke-width="1" fill="none"/>
    <path d="M78,150 Q180,146 282,150" stroke="#D8C0A0" stroke-width="1" fill="none"/>
    <path d="M80,162 Q180,158 280,162" stroke="#D8C0A0" stroke-width="1" fill="none"/>
    <!-- seam center -->
    <line x1="180" y1="124" x2="180" y2="165" stroke="#D8C0A0" stroke-width="0.8" stroke-dasharray="4,4"/>

    <!-- Pillows -->
    <path d="M70,118 Q70,110 80,108 L148,108 Q158,110 158,118 L155,126 Q155,130 113,130 Q70,130 70,126 Z" fill="#FAF4EC" stroke="#E0D4C0" stroke-width="1.2"/>
    <path d="M80,112 Q113,110 150,112" stroke="#E8DCC8" stroke-width="0.8" fill="none" opacity="0.7"/>
    <path d="M202,118 Q202,110 212,108 L280,108 Q290,110 290,118 L288,126 Q288,130 245,130 Q202,130 202,126 Z" fill="#FAF4EC" stroke="#E0D4C0" stroke-width="1.2"/>
    <path d="M212,112 Q246,110 282,112" stroke="#E8DCC8" stroke-width="0.8" fill="none" opacity="0.7"/>
  </g>

  <!-- Nightstand left -->
  <g filter="url(#wc)">
    <rect x="6" y="130" width="48" height="40" rx="3" fill="#A07850" stroke="#806030" stroke-width="1.2"/>
    <line x1="6" y1="152" x2="54" y2="152" stroke="#806030" stroke-width="0.8"/>
    <rect x="14" y="134" width="28" height="16" rx="2" fill="#B88860" stroke="#906840" stroke-width="0.8"/>
    <circle cx="28" cy="142" r="2" fill="#806030"/>
    <!-- lamp -->
    <rect x="24" y="116" width="6" height="16" rx="1" fill="#8B7055"/>
    <path d="M14,106 Q30,98 46,106 L43,118 Q30,122 17,118 Z" fill="#F0E080" stroke="#D8C040" stroke-width="1.2"/>
    <!-- book on nightstand -->
    <rect x="8" y="127" width="18" height="4" rx="1" fill="#C84848" transform="rotate(-5,17,129)"/>
  </g>

  <!-- Nightstand right -->
  <g filter="url(#wc)">
    <rect x="306" y="130" width="48" height="40" rx="3" fill="#A07850" stroke="#806030" stroke-width="1.2"/>
    <line x1="306" y1="152" x2="354" y2="152" stroke="#806030" stroke-width="0.8"/>
    <rect x="314" y="134" width="28" height="16" rx="2" fill="#B88860" stroke="#906840" stroke-width="0.8"/>
    <circle cx="328" cy="142" r="2" fill="#806030"/>
    <!-- lamp -->
    <rect x="328" y="116" width="6" height="16" rx="1" fill="#8B7055"/>
    <path d="M318,106 Q331,98 346,106 L343,118 Q331,122 319,118 Z" fill="#F0E080" stroke="#D8C040" stroke-width="1.2"/>
    <!-- small plant -->
    <rect x="330" y="125" width="12" height="8" rx="1" fill="#C46A42"/>
    <ellipse cx="336" cy="122" rx="9" ry="6" fill="#4A8A42"/>
    <path d="M330,122 Q336,114 342,122" stroke="#3A7032" stroke-width="1" fill="none"/>
  </g>
</g>
</svg>
