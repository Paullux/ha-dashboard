    <path d="M152,120 Q152,110 154,108 L206,108 Q210,110 210,120 L210,148 Q208,150 154,150 Q152,148 152,120 Z" fill="#7A9DC0" stroke="#6A8DA5" stroke-width="0.8"/>
    <path d="M214,120 Q214,110 216,108 L276,108 Q280,110 280,120 L280,148 Q278,150 216,150 Q214,148 214,120 Z" fill="#88ADCA" stroke="#6A8DA5" stroke-width="0.8"/>
    <path d="M90,118 Q110,115 140,118" stroke="#A0C5D8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M158,118 Q180,115 202,118" stroke="#A0C5D8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M220,118 Q245,115 272,118" stroke="#A0C5D8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M88,98 Q85,88 96,85 Q108,82 112,92 Q114,102 104,105 Q92,106 88,98 Z" fill="#EDD5A0" stroke="#D0B870" stroke-width="1.2"/>
