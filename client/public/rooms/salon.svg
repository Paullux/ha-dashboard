<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="paper" x="-2%" y="-2%" width="104%" height="104%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="8" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="textured"/>
    <feComponentTransfer in="textured">
      <feFuncR type="linear" slope="1.04" intercept="-0.02"/>
      <feFuncG type="linear" slope="1.02" intercept="-0.01"/>
    </feComponentTransfer>
  </filter>
  <filter id="wc" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.025 0.03" numOctaves="2" seed="12" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="wc2" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="turbulence" baseFrequency="0.04 0.05" numOctaves="2" seed="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="G" yChannelSelector="R"/>
  </filter>
  <radialGradient id="lamplight" cx="50%" cy="80%" r="60%">
    <stop offset="0%" stop-color="#FFF3B0" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#FFF3B0" stop-opacity="0"/>
  </radialGradient>
</defs>

<g filter="url(#paper)">
  <!-- Wall -->
  <path d="M0,0 L360,0 L360,168 L0,168 Z" fill="#EDE5D0"/>
  <!-- Baseboard -->
  <path d="M0,162 Q90,159 180,161 Q270,163 360,160 L360,170 L0,170 Z" fill="#D8CEBC" stroke="#C8BCA8" stroke-width="0.5"/>
  <!-- Floor -->
  <path d="M0,162 Q90,158 180,160 Q270,162 360,159 L360,240 L0,240 Z" fill="#C8906A"/>
  <line x1="0" y1="185" x2="360" y2="183" stroke="#B8804A" stroke-width="0.6" opacity="0.5"/>
  <line x1="0" y1="205" x2="360" y2="203" stroke="#B8804A" stroke-width="0.6" opacity="0.5"/>
  <line x1="0" y1="225" x2="360" y2="223" stroke="#B8804A" stroke-width="0.5" opacity="0.4"/>
  <line x1="60"  y1="162" x2="40"  y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.35"/>
  <line x1="120" y1="162" x2="108" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.35"/>
  <line x1="180" y1="162" x2="178" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.35"/>
  <line x1="240" y1="162" x2="248" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.35"/>
  <line x1="300" y1="162" x2="318" y2="240" stroke="#B8804A" stroke-width="0.4" opacity="0.35"/>

  <!-- Window -->
  <g filter="url(#wc2)">
    <rect x="128" y="10" width="104" height="78" rx="2" fill="#C2D8E5" stroke="#B0A888" stroke-width="2.5"/>
    <rect x="130" y="12" width="48" height="74" rx="1" fill="#D0E8F0" opacity="0.75"/>
    <rect x="180" y="12" width="50" height="74" rx="1" fill="#C8E2EE" opacity="0.75"/>
    <line x1="180" y1="12" x2="180" y2="86" stroke="#B0A888" stroke-width="2"/>
    <line x1="130" y1="48" x2="230" y2="48" stroke="#B0A888" stroke-width="2"/>
    <ellipse cx="180" cy="175" rx="55" ry="12" fill="#FFF8E0" opacity="0.25"/>
  </g>

  <!-- Painting left wall -->
  <g filter="url(#wc2)">
    <rect x="22" y="18" width="62" height="48" rx="2" fill="#8B7248" stroke="#7A6238" stroke-width="2"/>
    <rect x="26" y="22" width="54" height="40" fill="#D4C090"/>
    <rect x="26" y="22" width="54" height="22" fill="#A8C8DC"/>
