    <path d="M118,183 Q118,178 124,177 L236,177 Q242,178 242,183 L240,192 Q240,196 234,196 L126,196 Q120,196 120,192 Z" fill="#A07850" stroke="#806030" stroke-width="1.5"/>
    <path d="M130,181 Q165,179 210,181" stroke="#C09060" stroke-width="1" fill="none" opacity="0.5"/>
    <rect x="126" y="192" width="8" height="16" rx="2" fill="#906840" stroke="#706030" stroke-width="1"/>
    <rect x="226" y="192" width="8" height="16" rx="2" fill="#906840" stroke="#706030" stroke-width="1"/>
    <rect x="168" y="173" width="18" height="6" rx="1" fill="#C84040" opacity="0.7"/>
    <rect x="191" y="175" width="10" height="4" rx="1" fill="#E8E0C0" opacity="0.6"/>
