    <path d="M74,98 Q72,92 76,88 Q80,84 90,84 L270,84 Q280,84 284,88 Q288,92 286,98 L286,162 Q284,168 270,168 L90,168 Q76,168 74,162 Z" fill="#7A9DB5" stroke="#5A7D95" stroke-width="1.5"/>
